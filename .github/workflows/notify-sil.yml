name: Notify SIL on push

# Fires a repository_dispatch into 32Raven-SIL on every commit to master, so
# its Firmware Bump workflow opens a PR pinning to this SHA.
#
# Requires repo secret SIL_DISPATCH_TOKEN: a PAT with `Contents: write`
# + `Pull requests: write` on alirezazd/32Raven-SIL.

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions: {}

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Dispatch firmware-pushed to SIL
        env:
          GH_TOKEN: ${{ secrets.SIL_DISPATCH_TOKEN }}
        run: |
          gh api repos/alirezazd/32Raven-SIL/dispatches \
            -f event_type=firmware-pushed \
            -f client_payload[sha]="${{ github.sha }}" \
            -f client_payload[ref]="${{ github.ref }}" \
            -f client_payload[actor]="${{ github.actor }}"
